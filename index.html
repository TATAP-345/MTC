<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="32 Бригада ВДВ Республики Соколов">
  <title>32 Бригада ВДВ Республики Соколов</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header & Navigation -->
  <header id="main-header">
    <div class="nav-container">
      <a href="#" class="logo-wrapper" id="nav-logo">
        <div class="logo-icon">M</div>
        <span class="logo-text">MTC</span>
      </a>
      
      <div class="nav-actions">
        <!-- Light/Dark Mode Switcher -->
        <button class="theme-toggle" id="theme-toggle-btn" aria-label="Toggle visual theme">
          <!-- Moon Icon (Dark Mode) -->
          <svg class="moon-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3c.132 0 .263 0 .393.007a7.5 7.5 0 0 0 7.92 12.446A9 9 0 1 1 12 3Z"/>
          </svg>
          <!-- Sun Icon (Light Mode) -->
          <svg class="sun-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 5V3m0 18v-2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M3 12h2m14 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42M17 12a5 5 0 1 1-10 0 5 5 0 0 1 10 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main style="display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 2rem 0;">
    <!-- Hero Section -->
    <section class="hero" id="hero" style="width: 100%;">
      <h1 class="hero-title" id="main-hero-title" style="margin-bottom: 3rem;">32 Бригада ВДВ Республики Соколов</h1>
      <div class="units-container" style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; max-width: 950px; margin-left: auto; margin-right: auto;">
        <button class="btn btn-secondary unit-btn" id="unit-tayfun" style="padding: 0.8rem 1.6rem; font-size: 0.95rem;">Элитное подразделение Тайфун</button>
        <button class="btn btn-secondary unit-btn" id="unit-burevestnik" style="padding: 0.8rem 1.6rem; font-size: 0.95rem;">Авиационная Группа «Буревестник»</button>
        <button class="btn btn-secondary unit-btn" id="unit-berkut" style="padding: 0.8rem 1.6rem; font-size: 0.95rem;">Артилерийский Отряд «Беркут»</button>
        <button class="btn btn-secondary unit-btn" id="unit-sapsan" style="padding: 0.8rem 1.6rem; font-size: 0.95rem;">Десанттно Штурмовой Отряд «Сапсан»</button>
      </div>
    </section>
  </main>

  <!-- Success Toast Alert -->
  <div class="toast" id="success-toast" role="alert" aria-live="assertive">
    <span class="toast-icon">✓</span>
    <span class="toast-text" id="toast-message-text">Message sent successfully!</span>
  </div>

  <!-- JS Logic -->
  <script src="app.js"></script>
</body>
</html>
