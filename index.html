<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="32 Бригада ВДВ Республики Соколов - Подразделения.">
  <title>32 Бригада ВДВ Республики Соколов</title>
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main style="max-width: 900px; margin: 0 auto; padding: 8rem 2rem 4rem; text-align: center;">
    <!-- Main Title -->
    <h1 class="hero-title" style="font-size: clamp(2.5rem, 5vw, 4.5rem); margin-bottom: 2.5rem; background: linear-gradient(135deg, var(--text-color) 30%, var(--accent-color) 70%, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
      32 Бригада ВДВ Республики Соколов
    </h1>
    
    <!-- Unit Buttons Container -->
    <div class="units-container" style="display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3rem;">
      <button class="btn btn-secondary unit-btn" id="unit-tayfun" style="padding: 0.8rem 1.6rem; font-size: 0.95rem;">Элитное подразделение Тайфун</button>
      <button class="btn btn-secondary unit-btn" id="unit-burevestnik" style="padding: 0.8rem 1.6rem; font-size: 0.95rem;">Авиационная Группа «Буревестник»</button>
      <button class="btn btn-secondary unit-btn" id="unit-berkut" style="padding: 0.8rem 1.6rem; font-size: 0.95rem;">Артиллерийский отряд «Беркут»</button>
      <button class="btn btn-secondary unit-btn" id="unit-sapsan" style="padding: 0.8rem 1.6rem; font-size: 0.95rem;">Десантно-штурмовой отряд «Сапсан»</button>
    </div>
    
    <!-- Unit Details Display Card -->
    <div id="unit-details-card" class="feature-card" style="display: none; opacity: 0; transform: translateY(15px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); text-align: left; max-width: 800px; margin: 0 auto;">
      <h3 id="unit-details-title" class="card-title" style="color: var(--accent-color); font-size: 1.6rem; margin-bottom: 1.2rem;"></h3>
      <p style="margin-bottom: 0.85rem; font-size: 1.05rem;"><strong style="color: var(--text-color);">Лозунг:</strong> <span id="unit-details-slogan" style="font-style: italic;"></span></p>
      <p style="margin-bottom: 0.85rem; font-size: 1.05rem;"><strong style="color: var(--text-color);">Специализация:</strong> <span id="unit-details-specialty"></span></p>
      <p style="margin-bottom: 0; font-size: 1.05rem; line-height: 1.7;"><strong style="color: var(--text-color);">Задачи в MTC4:</strong> <span id="unit-details-tasks"></span></p>
    </div>
  </main>

  <!-- JS Logic -->
  <script src="app.js"></script>
</body>
</html>
